name: geotag
description: "Geotag camera — burn live location onto every shot."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  dynamic_color: ^1.7.0

  camera: ^0.11.0+2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_compass: ^0.8.1
  permission_handler: ^11.3.1

  intl: ^0.19.0
  path_provider: ^2.1.5
  image: ^4.3.0
  gal: ^2.3.0

  flutter_map: ^8.1.0
  latlong2: ^0.9.1

  ffmpeg_kit_flutter_new: ^4.1.0

  shared_preferences: ^2.3.4
  sensors_plus: ^6.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
